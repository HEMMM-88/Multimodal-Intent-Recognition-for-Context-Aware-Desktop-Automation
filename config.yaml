# Gesture Control Configuration (Simplified Core Model)
# ====================================================
# Core gestures (max 6):
#   open_palm        -> Cursor movement
#   pointing_up      -> Left click / Drag
#   two_finger_tap   -> Right click
#   three_fingers_up -> Scroll mode
#   thumbs_up/down   -> Volume control
#   closed_fist      -> Pause / Resume
#   none             -> Idle

settings:
  camera_index: 0
  detection_confidence: 0.62
  tracking_confidence: 0.62
  show_overlay: true
  startup_delay: 1.0
  app_refresh_seconds: 0.2

  # Gesture stability and debounce controls
  control:
    gesture_confidence_threshold: 0.7
    gesture_stability_seconds: 0.08
    min_palm_span: 0.05
    debounce_seconds: 0.25
    pause_toggle_debounce: 0.8

    primary_click_gesture: pointing_up
    pinch_click_hold_seconds: 0.12
    pinch_drag_hold_seconds: 0.45
    pinch_break_grace_seconds: 0.12
    drag_release_grace_seconds: 0.18
    two_finger_tap_stable_seconds: 0.15

    scroll_mode_inactivity_seconds: 1.0
    scroll_motion_threshold: 0.01

    browser_pinch_swipe_threshold: 0.12
    video_seek_horizontal_threshold: 0.06
    video_seek_debounce_seconds: 0.35
    volume_step_debounce_seconds: 0.22

    # Context-specific scroll tuning
    browser_scroll_scale: 1400.0
    code_scroll_scale: 900.0

    # Two-hand combo gestures
    two_hand_enabled: true
    primary_hand: "Right"        # this hand drives the cursor + all single-hand gestures
    swap_handedness: false       # MediaPipe's Left/Right can come out mirrored depending on
                                  # camera setup — the overlay shows detected hand labels live;
                                  # if your right hand shows as "Left" on screen, set this true
    combo_debounce_seconds: 0.35

    # Two-hand swipe (both hands open_palm, moving together) => window/tab switch
    two_hand_swipe_threshold: 0.09        # per-hand horizontal motion required (normalized 0-1)
    two_hand_swipe_debounce_seconds: 0.6
    two_hand_swipe_vertical_threshold: 0.09   # per-hand vertical motion required (normalized 0-1)
    two_hand_swipe_vertical_debounce_seconds: 0.55
    default_scroll_scale: 1000.0

  # Virtual mouse smoothing
  mouse_control:
    ema_alpha: 0.3
    drag_ema_alpha: 0.22
    deadzone_px: 1.3

    # Keep these for flexible orientation handling
    reverse_horizontal_motion: false
    reverse_vertical_motion: false
    mirror_sideways: false
    invert_x: false
    invert_y: false

# App-group hints for context detection.
# These are lightweight and checked at intervals to avoid lag.
apps:
  browser:
    window_titles:
      - "Google Chrome"
      - "Chromium"
      - "Mozilla Firefox"
      - "Microsoft Edge"
      - "Brave"
      - "Opera"

  video_player:
    window_titles:
      - "YouTube"
      - "VLC media player"
      - "Media Player"
      - "Movies & TV"
      - "Netflix"

  code_editor:
    window_titles:
      - "Visual Studio Code"
      - "Code"
      - "PyCharm"
      - "IntelliJ"
      - "Sublime Text"
      - "Notepad++"

  document_editor:
    window_titles:
      - "Word"
      - "Notepad"
      - "WordPad"
      - "Adobe Acrobat"
      - "Foxit"
      - "LibreOffice Writer"

  terminal:
    window_titles:
      - "Command Prompt"
      - "Windows PowerShell"
      - "Windows Terminal"
      - "ConEmu"
      - "WSL"

# Two-hand combo rules — a held pose on the *modifier* hand (the non-primary
# hand, see settings.control.primary_hand) changes what a *primary*-hand
# discrete gesture does. Only fire-once gestures can be combo targets today:
# two_finger_tap, thumbs_up, thumbs_down. Continuous gestures (open_palm
# cursor, three_fingers_up scroll, pinch/pointing click-drag) and the
# closed_fist pause toggle are deliberately never combo targets — pause must
# stay a reliable single-hand safety gesture, and continuous control isn't a
# good fit for combo semantics.
#
# Structure: context -> modifier_gesture -> primary_gesture -> {intent, action, label}
# Falls back the same way context_rules does: unmatched context -> "default",
# unmatched combo -> no combo (the normal single-hand action for that gesture runs).
# Two-hand combo rules — raise your OTHER hand (any pose, no specific shape
# needed) while your primary hand does thumbs_up/thumbs_down, and it means
# Redo/Undo instead of volume. That's the whole rule: second hand up = shortcuts.
#
# Structure: context -> primary_gesture -> {intent, action, label}
# Falls back the same way context_rules does: unmatched context -> "default",
# unmatched gesture -> no combo (the normal single-hand action for that
# gesture runs instead, e.g. thumbs_up alone still means volume up).
# Two-hand combo rules — raise your OTHER hand (any pose, no specific shape
# needed) while your primary hand does thumbs_up/thumbs_down, and it means
# fullscreen/minimize instead of volume. Same rule everywhere: up = go
# bigger, down = go smaller. The "bigger" action's exact key differs by
# context (F11 fullscreens a browser/app window; a video player's own player
# usually binds fullscreen to plain "f" instead, and F11 would just
# fullscreen the browser tab around the video rather than the video itself).
#
# Structure: context -> primary_gesture -> {intent, action, label}
# Falls back the same way context_rules does: unmatched context -> "default",
# unmatched gesture -> no combo (the normal single-hand action runs instead,
# e.g. thumbs_up alone still means volume up).
combo_rules:
  default:
    thumbs_up:
      intent: fullscreen_toggle
      action: "key:f11"
      label: "FULLSCREEN (2H)"
    thumbs_down:
      intent: minimize_window
      action: "key:win+down"
      label: "MINIMIZE (2H)"

  video_player:
    thumbs_up:
      intent: fullscreen_toggle
      action: "key:f"
      label: "FULLSCREEN VIDEO (2H)"

# Context-aware intent rules — no code changes needed to retune behavior.
# Each entry: context -> gesture (or synthetic trigger) -> {intent, action, label}
#   - `intent`: internal name main.py switches on for stateful/continuous gestures
#   - `action`: an action_executor.py action string, or omit/null for stateful intents
#   - `label`:  text shown on the HUD overlay
# Synthetic trigger keys (raised by main.py, not real gestures):
#   primary_click_swipe   -> horizontal drag during the primary click gesture
#   open_palm_horizontal  -> horizontal motion while open_palm is held
#   two_hand_swipe        -> both hands open_palm, moving together horizontally
#                            (see settings.control.two_hand_swipe_threshold /
#                            two_hand_swipe_debounce_seconds). Intent name
#                            resolved here must exist in main.py's
#                            TWO_HAND_SWIPE_ACTIONS table or nothing fires.
# Unlisted (context, gesture) pairs fall back to the "default" context's rule,
# and if that's also missing, to intent "none" (no-op).
context_rules:
  default:
    two_finger_tap:
      intent: right_click
      action: right_click
      label: "RIGHT_CLICK"
    thumbs_up:
      intent: volume_up
      action: volume_up
      label: "VOLUME_UP"
    thumbs_down:
      intent: volume_down
      action: volume_down
      label: "VOLUME_DOWN"
    closed_fist:
      intent: pause_toggle
      label: "PAUSE_TOGGLE"
    three_fingers_up:
      intent: scroll
      label: "SCROLL"
    open_palm_horizontal:
      intent: none
      label: "-"
    primary_click_swipe:
      intent: none
      label: "-"
    two_hand_swipe:
      intent: window_switch
      label: "WINDOW_SWITCH"

  browser:
    primary_click_swipe:
      intent: browser_nav
      label: "BACK/FORWARD"
    two_hand_swipe:
      intent: browser_tab_switch
      label: "TAB_SWITCH"

  video_player:
    three_fingers_up:
      intent: volume_step
      label: "VOLUME_STEP"
    open_palm_horizontal:
      intent: video_seek
      label: "SEEK"

  code_editor:
    two_finger_tap:
      intent: right_click
      action: right_click
      label: "CONTEXT_MENU"

  document_editor:
    open_palm_horizontal:
      intent: page_nav
      label: "PAGE_NAV"

  terminal:
    two_finger_tap:
      intent: right_click
      action: right_click
      label: "PASTE"   # cmd.exe/PowerShell paste-on-right-click by default